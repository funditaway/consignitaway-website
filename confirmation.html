<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thank you for your order! Track your purchase in your Consign It Away dashboard.">
  <title>Order Confirmed | Consign It Away</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header id="site-header"></header>

  <div class="container" style="padding:3rem 0;text-align:center">
    <div style="max-width:620px;margin:0 auto">
      <div style="font-size:4rem;margin-bottom:1rem">🎉</div>
      <h1 style="font-size:2.25rem;margin-bottom:0.5rem">Thank you for your order!</h1>
      <p style="font-size:1.1rem;color:var(--gray-700);margin-bottom:2rem">
        Your order has been received and is being processed. 
        You'll receive a confirmation email shortly.
      </p>

      <div id="order-summary-card" style="background:white;border:1px solid var(--gray-300);border-radius:12px;padding:1.5rem;text-align:left;margin-bottom:2rem">
        <!-- Populated by JS -->
      </div>

      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <a href="dashboard.html" class="btn btn-primary btn-lg">View in Dashboard</a>
        <a href="shop.html" class="btn btn-outline btn-lg">Continue Shopping</a>
      </div>

      <p style="margin-top:2rem;font-size:0.85rem;color:var(--gray-500)">
        Questions? Contact us at <a href="mailto:info@consignitaway.com">info@consignitaway.com</a> or (417) 720-1199.
      </p>
    </div>
  </div>

  <footer id="site-footer"></footer>

  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script>
    function getOrderIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('order');
    }

    function renderConfirmation() {
      const orderId = getOrderIdFromUrl();
      const container = document.getElementById('order-summary-card');

      let order = null;
      if (orderId) {
        const orders = JSON.parse(localStorage.getItem('cia-orders') || '[]');
        order = orders.find(o => o.id === orderId);
      }

      if (!order) {
        // Fallback demo order
        order = {
          id: orderId || 'ORD-DEMO123',
          date: new Date().toISOString(),
          total: 89.00,
          items: [{ name: 'Demo Item', price: 89 }],
          shipping: { firstName: 'Alex', lastName: 'Rivera', address: '123 Main St, Springfield, MO 65804' },
          paymentMethod: 'square'
        };
      }

      const itemsHtml = (order.items || []).map(item => `
        <div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid #f5f5f5">
          <span>${item.name} ${item.quantity ? `× ${item.quantity}` : ''}</span>
          <span>$${(item.price || 0).toFixed(2)}</span>
        </div>
      `).join('');

      container.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:1rem">
          <div>
            <div style="font-size:0.85rem;color:var(--gray-500)">Order Number</div>
            <div style="font-weight:700;font-size:1.15rem">${order.id}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:0.85rem;color:var(--gray-500)">Order Date</div>
            <div>${new Date(order.date).toLocaleDateString()}</div>
          </div>
        </div>

        <div style="margin:1rem 0 1.25rem">
          ${itemsHtml || '<div>No items</div>'}
        </div>

        <div style="display:flex;justify-content:space-between;font-weight:700;margin-top:0.75rem">
          <div>Total</div>
          <div>$${(order.total || 0).toFixed(2)}</div>
        </div>

        <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid #eee;font-size:0.9rem">
          <strong>Shipping to:</strong><br>
          ${order.shipping?.firstName || ''} ${order.shipping?.lastName || ''}<br>
          ${order.shipping?.address || 'Address on file'}<br>
          <span style="color:var(--gray-500)">Estimated delivery: 3-7 business days</span>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderConfirmation();
    });
  </script>
</body>
</html>
